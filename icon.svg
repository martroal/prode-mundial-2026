<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#0d1454"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Soccer ball -->
  <circle cx="256" cy="210" r="125" fill="white"/>

  <!-- Center pentagon -->
  <polygon points="256,165 297,193 282,238 230,238 215,193" fill="#1a237e"/>

  <!-- Connecting lines to outer edge -->
  <line x1="256" y1="165" x2="256" y2="93"  stroke="#1a237e" stroke-width="6" stroke-linecap="round"/>
  <line x1="297" y1="193" x2="365" y2="178" stroke="#1a237e" stroke-width="6" stroke-linecap="round"/>
  <line x1="282" y1="238" x2="328" y2="290" stroke="#1a237e" stroke-width="6" stroke-linecap="round"/>
  <line x1="230" y1="238" x2="184" y2="290" stroke="#1a237e" stroke-width="6" stroke-linecap="round"/>
  <line x1="215" y1="193" x2="147" y2="178" stroke="#1a237e" stroke-width="6" stroke-linecap="round"/>

  <!-- Outer patches (5 small) -->
  <polygon points="256,93  240,75  272,75"  fill="#1a237e"/>
  <polygon points="365,178 352,160 380,170" fill="#1a237e"/>
  <polygon points="328,290 348,302 320,310" fill="#1a237e"/>
  <polygon points="184,290 164,302 192,310" fill="#1a237e"/>
  <polygon points="147,178 132,170 160,160" fill="#1a237e"/>

  <!-- Ball outline -->
  <circle cx="256" cy="210" r="125" fill="none" stroke="#1a237e" stroke-width="6"/>

  <!-- 2026 -->
  <text x="256" y="435" font-family="Impact, 'Arial Black', 'Arial Narrow Bold', sans-serif" font-size="92" font-weight="900" fill="#ffd700" text-anchor="middle" letter-spacing="3" style="paint-order:stroke;stroke:#1a237e;stroke-width:2">2026</text>
</svg>
